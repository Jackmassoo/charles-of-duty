<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles of Duty</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">

        <h1>⚔️ CHARLES OF DUTY ⚔️</h1>

        <h2>La Quête du Marié</h2>

        <div class="card">

            <h3>Niveau du Marié</h3>

            <div id="level">
                Général du Célibat
            </div>

        </div>

        <div class="card">

            <h3>🔫 Billes</h3>

            <div id="bullets">
                Chargement...
            </div>

        </div>

        <div class="card">

            <h3>🪖 Coéquipiers</h3>

            <div id="teammates">
                Chargement...
            </div>

        </div>

        <div class="card">

            <h3>📊 Progression</h3>

            <div id="progress">
                0%
            </div>

        </div>

    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

</body>
</html>
