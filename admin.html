<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">

        <h1>🔧 Administration</h1>

        <div class="card">

            <h3>🔫 Billes</h3>

            <button onclick="addBullets(10)">
                +10 billes
            </button>

            <br><br>

            <button onclick="addBullets(-10)">
                -10 billes
            </button>

        </div>

        <div class="card">

            <h3>🪖 Coéquipiers</h3>

            <button onclick="addTeammate(1)">
                +1 coéquipier
            </button>

            <br><br>

            <button onclick="addTeammate(-1)">
                -1 coéquipier
            </button>

        </div>

        <div class="card">

            <h3>🎁 Créer une mission bonus</h3>

            <input
                type="text"
                id="bonus-title"
                placeholder="Titre de la mission">

            <br><br>

            <input
                type="number"
                id="bonus-reward"
                placeholder="Récompense">

            <br><br>

            <select id="bonus-type">
                <option value="bullets">
                    Billes
                </option>

                <option value="teammate">
                    Coéquipier
                </option>
            </select>

            <br><br>

            <button onclick="createBonusMission()">
                Créer la mission
            </button>

        </div>

        <div class="card">

            <h3>🗑 Missions bonus</h3>

            <div id="bonus-list">
                Chargement...
            </div>

        </div>

        <div class="card">

            <h3>🔄 Réactiver une mission</h3>

            <div id="validated-list">
                Chargement...
            </div>

        </div>

        <br>

        <a href="index.html">
            <button>
                ⬅ Retour à l'accueil
            </button>
        </a>

    </div>

    <script src="supabase.js"></script>
    <script src="admin.js"></script>

</body>

</html>
