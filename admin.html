<!DOCTYPE html>

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles of Duty</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">

        <header class="hero">

            <h1>⚔️ CHARLES OF DUTY ⚔️</h1>

            <h2>La Quête du Marié</h2>

            <p class="subtitle">
                Team Équipée du Marié
            </p>

            <img
                src="assets/charles.jpg"
                alt="Charles"
                class="charles-photo">

        </header>

        <div class="card">

            <h3>🏅 Niveau du Marié</h3>

            <div id="level">
                Général du Célibat
            </div>

        </div>

        <div class="card">

            <h3>📈 Progression</h3>

            <div class="progress-container">

                <div id="progress-bar"></div>

            </div>

            <div id="progress">
                0%
            </div>

        </div>

        <div class="stats-grid">

            <div class="card">

                <h3>🔫 Billes</h3>

                <div id="bullets">
                    Chargement...
                </div>

            </div>

            <div class="card">

                <h3>🪖 Coéquipiers</h3>

                <div id="teammates">
                    Chargement...
                </div>

            </div>

        </div>

        <div class="stats-grid">

            <div class="card">

                <h3>🏆 Succès</h3>

                <div id="achievements-count">
                    0
                </div>

            </div>

            <div class="card">

                <h3>🎯 Missions</h3>

                <div id="missions-count">
                    0 / 43
                </div>

            </div>

        </div>

        <div class="card">

            <a href="missions.html">
                <button>
                    🎯 Voir les missions
                </button>
            </a>

            <br><br>

            <a href="warlog.html">
                <button>
                    📜 Journal de Guerre
                </button>
            </a>

            <br><br>

            <a href="achievements.html">
                <button>
                    🏆 Voir les succès
                </button>
            </a>

            <br><br>

            <a href="admin.html">
                <button>
                    🔧 Administration
                </button>
            </a>

        </div>

    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

</body>

</html>
